# .github/workflows/build-caddy-dns.yml
name: Build and Push Caddy-DNS Multi-Platform Image

on:
  schedule:
    # 每天 UTC 时间 0 点检查一次（可根据需要调整）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest Caddy release version
        id: caddy_version
        run: |
          # 获取最新 release tag，例如 v2.11.4
          LATEST_TAG=$(curl -s https://api.github.com/repos/caddyserver/caddy/releases/latest | jq -r .tag_name)
          # 去掉前缀 v
          VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          # 构建参数传入版本（Dockerfile 中需声明 ARG CADDY_VERSION）
          build-args: |
            CADDY_VERSION=${{ steps.caddy_version.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/caddy-dns:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/caddy-dns:${{ steps.caddy_version.outputs.version }}