name: Build and Push Caddy-DNS Multi-Platform Image

on:
  schedule:
    # 每天 UTC 时间 0 点检查一次（可根据需要调整）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest Caddy release version
        id: caddy_version
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/caddyserver/caddy/releases/latest | jq -r .tag_name)
          VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      # 新增步骤：检查该版本是否已经构建并推送过
      - name: Check if version already exists on Docker Hub
        id: check_version
        run: |
          VERSION=${{ steps.caddy_version.outputs.version }}
          IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/caddy-dns
          # 尝试拉取该版本的 manifest，成功则说明镜像已存在
          if docker manifest inspect ${IMAGE_NAME}:${VERSION} > /dev/null 2>&1; then
            echo "Image ${IMAGE_NAME}:${VERSION} already exists. Skipping build."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Image ${IMAGE_NAME}:${VERSION} not found. Proceeding with build."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check_version.outputs.exists != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_version.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check_version.outputs.exists != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check_version.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            CADDY_VERSION=${{ steps.caddy_version.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/caddy-dns:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/caddy-dns:${{ steps.caddy_version.outputs.version }}